<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frey Creates</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:'Open Sans',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:30px;

    background:
        radial-gradient(
            circle at top left,
            rgba(140,82,255,0.20) 0%,
            transparent 35%
        ),
        radial-gradient(
            circle at bottom right,
            rgba(255,0,161,0.18) 0%,
            transparent 35%
        ),
        linear-gradient(
            135deg,
            #faf8ff 0%,
            #fff5fb 100%
        );
}

.card{
    width:100%;
    max-width:430px;

    padding:24px;

    background:rgba(255,255,255,0.80);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);

    border:1px solid rgba(255,255,255,0.8);
    border-radius:28px;

    box-shadow:
        0 20px 50px rgba(140,82,255,0.12),
        0 10px 25px rgba(255,0,161,0.08);

    text-align:center;
}

.logo{
    width:100%;
    max-width:380px;
    border-radius:20px;
    display:block;
    margin:0 auto 24px;
}

.subtitle{
    font-size:15px;
    color:#666;
    margin-bottom:28px;
    letter-spacing:.3px;
}

.btn{
    display:block;
    text-decoration:none;
    color:white;

    padding:16px 20px;
    margin-bottom:14px;

    border-radius:999px;

    font-weight:700;
    font-size:15px;
    letter-spacing:.3px;

    background:linear-gradient(
        135deg,
        #8C52FF 0%,
        #B43BFF 50%,
        #FF00A1 100%
    );

    transition:all .25s ease;

    box-shadow:
        0 8px 20px rgba(140,82,255,.25);
}

.btn:hover{
    transform:translateY(-4px) scale(1.02);

    box-shadow:
        0 15px 30px rgba(140,82,255,.35);
}

.btn:last-child{
    margin-bottom:0;
}

.footer{
    margin-top:18px;
    font-size:13px;
    color:#999;
}
</style>
</head>

<body>

<div class="card">

    <img
        src="https://i.ibb.co/bgvmMBxQ/freyindex.png"
        alt="Frey"
        class="logo"
    >

    <div class="subtitle">
        DJ • Social Media Management • Content
    </div>

    <a
        href="https://instagram.com/frey.m4a"
        class="btn"
        target="_blank"
        rel="noopener noreferrer"
    >
        Instagram
    </a>

    <a
        href="https://ra.co/dj/frey-nl"
        class="btn"
        target="_blank"
        rel="noopener noreferrer"
    >
        Resident Advisor
    </a>

    <a
        href="mailto:hello@freycreates.nl"
        class="btn"
    >
        Send an Email
    </a>

</div>

</body>
</html>
