<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frey Creates</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

html{ scroll-behavior:smooth; }

body{
    font-family:'Open Sans',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
    background:#ffffff;
    overflow-x:hidden;
}

/* DARK MODE */
@media (prefers-color-scheme: dark){
    body{ background:#0b0b10; }
}

/* ANIMATION (UNCHANGED) */
body::before{
    content:"";
    position:fixed;
    inset:-20%;
    z-index:-1;
    background:
        radial-gradient(circle at 15% 25%, rgba(140,82,255,0.85), transparent 40%),
        radial-gradient(circle at 85% 20%, rgba(255,0,161,0.75), transparent 45%),
        radial-gradient(circle at 40% 85%, rgba(120,60,255,0.55), transparent 50%),
        radial-gradient(circle at 80% 90%, rgba(255,0,161,0.45), transparent 55%),
        radial-gradient(circle at 50% 50%, rgba(0,0,0,0.3), transparent 60%);
    filter: blur(28px);
    animation: floatGlow 6s ease-in-out infinite alternate;
}

@media (prefers-color-scheme: dark){
    body::before{
        background:
            radial-gradient(circle at 15% 25%, rgba(140,82,255,0.85), transparent 40%),
            radial-gradient(circle at 85% 20%, rgba(255,0,161,0.75), transparent 45%),
            radial-gradient(circle at 40% 85%, rgba(120,60,255,0.55), transparent 50%),
            radial-gradient(circle at 80% 90%, rgba(255,0,161,0.45), transparent 55%),
            radial-gradient(circle at 50% 50%, rgba(0,0,0,0.75), transparent 60%);
    }
}

@keyframes floatGlow{
    0%{ transform: translate(-4%, -25%) scale(1) rotate(2deg); }
    50%{ transform: translate(5%, 30%) scale(1.5) rotate(60deg); }
    100%{ transform: translate(-2%, 60%) scale(1.12) rotate(-40deg); }
}

/* CARD */
.card{
    width:100%;
    max-width:520px;
    padding:26px;
    border-radius:28px;
    text-align:center;
    position:relative;
    background:rgba(255,255,255,0.78);
    backdrop-filter:blur(16px);
}

@media (prefers-color-scheme: dark){
    .card{ background:rgba(20,20,25,0.88); }
}

/* NEXT UP */
.nextup-badge{
    position:absolute;
    top:-12px;
    left:50%;
    transform:translateX(-50%);
    padding:6px 12px;
    border-radius:999px;
    font-size:11px;
    font-weight:800;
    color:#fff;
    background:linear-gradient(135deg,#FF00A1,#8C52FF);
}

.next-event{
    margin-top:10px;
    font-size:15px;
    font-weight:700;
    color:#222;
}

@media (prefers-color-scheme: dark){
    .next-event{ color:#fff; }
}

.divider{
    height:1px;
    margin:14px 0 18px;
    background:linear-gradient(90deg,transparent,rgba(140,82,255,0.35),rgba(255,0,161,0.35),transparent);
}

/* LOGO */
.logo{
    width:100%;
    max-width:420px;
    margin:18px auto 24px;
    display:block;
}

@media (max-width:600px){
    .logo{
        max-width:230px;
        margin:10px auto 14px;
    }
}

/* SUBTITLE (smaller) */
.subtitle{
    font-size:13px;
    color:#666;
    margin-bottom:8px;
}

/* BIO (UPDATED TEXT ONLY) */
.bio{
    font-size:11.5px;
    color:#888;
    line-height:1.7;
    margin-bottom:18px;
    padding:0 6px;
}

/* BUTTONS */
.btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    text-decoration:none;
    color:#fff;
    padding:12px 16px;
    margin-bottom:12px;
    border-radius:999px;
    font-weight:700;
    font-size:13.5px;
    background:linear-gradient(135deg,#FF00A1,#8C52FF);
}

/* INSTAGRAM ICON */
.icon{
    width:16px;
    height:16px;
    fill:white;
}

/* GIGS */
.gigs{
    margin-top:26px;
    padding-top:18px;
    border-top:1px solid rgba(140,82,255,.15);
    text-align:left;
}

.gigs h3{
    text-align:center;
    font-size:14px;
    margin-bottom:12px;
    color:#8C52FF;
    text-transform:uppercase;
}

.gig{
    font-size:14px;
    color:#555;
    padding:6px 0;
}

.date{
    display:inline-block;
    width:55px;
    font-weight:700;
    color:#8C52FF;
}

#past{
    max-height:0;
    overflow:hidden;
    opacity:0;
    transition:.5s ease;
}

#past.open{
    max-height:900px;
    opacity:1;
}
</style>
</head>

<body>

<div class="card">

    <div class="nextup-badge">NEXT UP</div>
    <div id="nextEvent" class="next-event"></div>

    <div class="divider"></div>

    <img src="https://i.ibb.co/mrgPbyMK/freyindex3.png" class="logo" alt="Frey">

    <div class="subtitle"><strong>DJ | CREATIVE | SOCIAL MEDIA MANAGEMENT</strong></div>

    <div class="bio">
        Pop-culture enthusiast raised on Gaga, Britney, ABBA finds religion in the queer club scene.
        In his set, discover your own church through pop girls from today & yesterday.
    </div>

    <a href="mailto:hello@freycreates.nl" class="btn">✉️ Bookings & Collabs</a>

    <a href="https://instagram.com/frey.m4a" class="btn" target="_blank">
        <svg class="icon" viewBox="0 0 24 24">
            <path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5zm10 2H7a3 3 0 0 0-3 3v10a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3V7a3 3 0 0 0-3-3zm-5 4.5A5.5 5.5 0 1 1 6.5 14 5.5 5.5 0 0 1 12 8.5zm0 2A3.5 3.5 0 1 0 15.5 14 3.5 3.5 0 0 0 12 10.5zM18 6.8a1.2 1.2 0 1 1-1.2-1.2A1.2 1.2 0 0 1 18 6.8z"/>
        </svg>
        Instagram
    </a>

    <div class="gigs">
        <h3>Upcoming Gigs</h3>
        <div id="upcoming"></div>
    </div>

    <div class="gigs">
        <h3 onclick="togglePast()" style="cursor:pointer;">Past Gigs ▾</h3>
        <div id="past"></div>
    </div>

</div>

<script>
const gigs = [
    { date:"27/6", venue:"Backsteeg, Rotterdam" },
    { date:"29/6", venue:"FERRY, Rotterdam" },
    { date:"10/7", venue:"Pink Noise, Amersfoort" },
    { date:"25/7", venue:"Milkshake Festival, Amsterdam" },
    { date:"31/7", venue:"Homomonument, Amsterdam" },
    { date:"1/8", venue:"Prik Pride, Amsterdam" },
    { date:"1/8", venue:"Paradiso, Amsterdam" },
    { date:"6/8", venue:"Pride Village Queerfest, Amsterdam" },
    { date:"8/8", venue:"NYX, Amsterdam" },
    { date:"28/8", venue:"FERRY, Rotterdam" },
    { date:"5/9", venue:"Hullabaloo, Groningen" },

    { date:"20/3", venue:"FERRY, Rotterdam" },
    { date:"16/3", venue:"FERRY, Rotterdam" },
    { date:"14/2", venue:"FERRY, Rotterdam" },
    { date:"9/2", venue:"FERRY, Rotterdam" },
    { date:"2/2", venue:"FERRY, Rotterdam" },
    { date:"10/1", venue:"NYX, Amsterdam" },

    { date:"19/6", venue:"FERRY, Rotterdam" },
    { date:"29/5", venue:"FERRY, Rotterdam" },
    { date:"8/5", venue:"NYX, Amsterdam" },
    { date:"3/4", venue:"Rabbit's Hole, Singapore" },
    { date:"28/3", venue:"NYX, Amsterdam" }
];

function parseDate(d){
    const [day, month] = d.split("/");
    const year = new Date().getFullYear();
    return new Date(year, month-1, day);
}

const today = new Date();
today.setHours(0,0,0,0);

gigs.sort((a,b)=>parseDate(a.date)-parseDate(b.date));

const upcoming = gigs.filter(g => parseDate(g.date) >= today);
const past = gigs.filter(g => parseDate(g.date) < today);

document.getElementById("nextEvent").innerText =
upcoming.length ? `${upcoming[0].date} — ${upcoming[0].venue}` : "No upcoming gigs";

const upcomingContainer = document.getElementById("upcoming");
upcoming.forEach(g=>{
    const div=document.createElement("div");
    div.className="gig";
    div.innerHTML=`<span class="date">${g.date}</span>${g.venue}`;
    upcomingContainer.appendChild(div);
});

const pastContainer=document.getElementById("past");
past.sort((a,b)=>parseDate(b.date)-parseDate(a.date))
.forEach(g=>{
    const div=document.createElement("div");
    div.className="gig";
    div.innerHTML=`<span class="date">${g.date}</span>${g.venue}`;
    pastContainer.appendChild(div);
});

function togglePast(){
    document.getElementById("past").classList.toggle("open");
}
</script>

</body>
</html>
