<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frey Creates</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:'Open Sans',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:30px;
    background:
        radial-gradient(circle at top left,#f3d5ff 0%,transparent 40%),
        radial-gradient(circle at bottom right,#ffd6ec 0%,transparent 40%),
        linear-gradient(135deg,#faf7ff 0%,#fff8fc 100%);
}

.card{
    width:100%;
    max-width:420px;
    padding:40px 32px;
    text-align:center;

    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.6);
    border-radius:24px;

    box-shadow:
        0 20px 40px rgba(139,63,214,0.08),
        0 5px 15px rgba(0,0,0,0.04);
}

.logo{
    width:80%;
    max-width:260px;
    margin-bottom:24px;
}

.subtitle{
    color:#666;
    font-size:15px;
    margin-bottom:30px;
    letter-spacing:.3px;
}

.btn{
    display:block;
    text-decoration:none;
    color:white;
    font-weight:700;
    padding:15px 20px;
    border-radius:999px;
    margin-bottom:14px;

    background:linear-gradient(135deg,#8b3fd6,#e03299);

    transition:all .25s ease;

    box-shadow:
        0 8px 20px rgba(139,63,214,.18);
}

.btn:hover{
    transform:translateY(-3px);
    box-shadow:
        0 12px 25px rgba(139,63,214,.25);
}

.btn.ra{
    background:linear-gradient(135deg,#1a1a1a,#4a4a4a);
}

.btn.email{
    background:linear-gradient(135deg,#00b894,#00d2a0);
}

.footer{
    margin-top:24px;
    font-size:13px;
    color:#999;
}
</style>
</head>

<body>

<div class="card">

    <img
        src="https://i.ibb.co/b52C3SY1/freylogo1.png"
        alt="Frey Logo"
        class="logo"
    >

    <div class="subtitle">
        DJ • Social Media Management • Content
    </div>

    <a href="https://instagram.com/frey.m4a"
       class="btn"
       target="_blank">
       Instagram
    </a>

    <a href="https://ra.co/dj/frey-nl"
       class="btn ra"
       target="_blank">
       Resident Advisor
    </a>

    <a href="mailto:hello@freycreates.nl"
       class="btn email">
       Send an Email
    </a>

</div>

</body>
</html>
