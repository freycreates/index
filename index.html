<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frey Creates</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:'Open Sans',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:30px;

    background:
        radial-gradient(circle at top left, rgba(140,82,255,0.18) 0%, transparent 35%),
        radial-gradient(circle at bottom right, rgba(255,0,161,0.14) 0%, transparent 35%),
        linear-gradient(135deg,#faf8ff 0%,#fff5fb 100%);
}

.card{
    width:100%;
    max-width:430px;
    padding:24px;

    background:rgba(255,255,255,0.82);
    backdrop-filter:blur(16px);

    border:1px solid rgba(255,255,255,0.8);
    border-radius:28px;

    box-shadow:
        0 20px 50px rgba(140,82,255,0.10),
        0 10px 25px rgba(255,0,161,0.06);

    text-align:center;
}

.logo{
    width:100%;
    max-width:380px;
    border-radius:20px;
    display:block;
    margin:0 auto 24px;
}

.subtitle{
    font-size:15px;
    color:#666;
    margin-bottom:10px;
}

.location{
    color:#666;
    font-size:14px;
    margin-bottom:24px;
}

/* BUTTONS */
.btn{
    display:block;
    text-decoration:none;
    color:white;

    padding:16px 20px;
    margin-bottom:14px;

    border-radius:999px;

    font-weight:700;
    font-size:15px;

    background:linear-gradient(135deg,#FF00A1 0%,#8C52FF 100%);

    box-shadow:0 10px 22px rgba(140,82,255,.22);

    transition:all .25s ease;
}

.btn:hover{
    transform:translateY(-4px) scale(1.02);
    box-shadow:0 18px 35px rgba(140,82,255,.28);
}

/* GIGS */
.gigs{
    margin-top:30px;
    padding-top:24px;
    border-top:1px solid rgba(140,82,255,.12);
    text-align:left;
}

.gigs h3{
    text-align:center;
    font-size:15px;
    margin-bottom:16px;
    color:#8C52FF;
    text-transform:uppercase;
    letter-spacing:1px;
}

.gig{
    font-size:14px;
    color:#555;
    padding:8px 0;
    line-height:1.5;
}

.date{
    display:inline-block;
    width:52px;
    font-weight:700;
    color:#8C52FF;
}

.tag{
    font-size:10px;
    font-weight:800;
    margin-left:8px;
    padding:3px 8px;
    border-radius:999px;
    color:white;
    background:#8C52FF;
}

.tag.today{
    background:#FF00A1;
}

.highlight{
    transform:scale(1.02);
    color:#222;
}
</style>
</head>

<body>

<div class="card">

    <img src="https://i.ibb.co/bgvmMBxQ/freyindex.png" class="logo" alt="Frey">

    <div class="subtitle">
        DJ • Creative • Social Media Management
    </div>

    <div class="location">
        Based in Amsterdam 🇳🇱
    </div>

    <a href="https://instagram.com/frey.m4a" class="btn" target="_blank">Instagram</a>

    <a href="https://ra.co/dj/frey-nl" class="btn" target="_blank">Resident Advisor</a>

    <a href="mailto:hello@freycreates.nl" class="btn">
        ✉️ Bookings & Collabs
    </a>

    <div class="gigs">
        <h3>Upcoming Gigs</h3>
        <div id="gigList"></div>
    </div>

</div>

<script>
const gigs = [
    { date:"27/6", venue:"Backsteeg, Rotterdam" },
    { date:"29/6", venue:"Ferry, Rotterdam" },
    { date:"10/7", venue:"Pink Noise, Amersfoort" },
    { date:"25/7", venue:"Milkshake Festival, Amsterdam" },
    { date:"31/7", venue:"Homomonument, Amsterdam" },
    { date:"1/8", venue:"Prik Pride, Amsterdam" }
];

function parseDate(d){
    const [day, month] = d.split("/");
    const year = new Date().getFullYear();
    return new Date(year, month-1, day);
}

const today = new Date();
today.setHours(0,0,0,0);

gigs.sort((a,b)=>parseDate(a.date)-parseDate(b.date));

let nextIndex = gigs.findIndex(g => parseDate(g.date) >= today);
if(nextIndex === -1) nextIndex = 0;

const container = document.getElementById("gigList");

gigs.forEach((g, i) => {

    const div = document.createElement("div");
    div.className = "gig";

    const isToday = parseDate(g.date).getTime() === today.getTime();
    const isNext = i === nextIndex;

    let tag = "";

    if(isToday){
        tag = `<span class="tag today">TODAY</span>`;
        div.classList.add("highlight");
    } else if(isNext){
        tag = `<span class="tag">NEXT UP</span>`;
        div.classList.add("highlight");
    }

    div.innerHTML = `
        <span class="date">${g.date}</span>
        ${g.venue}
        ${tag}
    `;

    container.appendChild(div);
});
</script>

</body>
</html>
