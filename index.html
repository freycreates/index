<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frey Creates</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

html{ scroll-behavior:smooth; }

body{
    font-family:'Open Sans',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:30px;
    overflow-x:hidden;
    background:#faf8ff;
}

/* BACKGROUND */
body::before{
    content:"";
    position:fixed;
    inset:-40%;
    z-index:-1;

    background:
        radial-gradient(circle at 15% 25%, rgba(140,82,255,0.65), transparent 38%),
        radial-gradient(circle at 85% 20%, rgba(255,0,161,0.55), transparent 40%),
        radial-gradient(circle at 40% 85%, rgba(120,60,255,0.35), transparent 45%),
        radial-gradient(circle at 90% 90%, rgba(255,0,161,0.30), transparent 42%);

    filter: blur(55px);
    animation: floatGlow 8s ease-in-out infinite alternate;
}

body::after{
    content:"";
    position:fixed;
    inset:-50%;
    z-index:-1;

    background:
        radial-gradient(circle at 60% 40%, rgba(140,82,255,0.30), transparent 50%),
        radial-gradient(circle at 20% 70%, rgba(255,0,161,0.25), transparent 55%);

    filter: blur(80px);
    animation: floatGlow2 11s ease-in-out infinite alternate;
}

@keyframes floatGlow{
    0%{ transform: translate(-4%, -2%) scale(1); }
    50%{ transform: translate(5%, 3%) scale(1.12); }
    100%{ transform: translate(-2%, 6%) scale(1.06); }
}

@keyframes floatGlow2{
    0%{ transform: translate(3%, 5%) scale(1); }
    50%{ transform: translate(-6%, -3%) scale(1.15); }
    100%{ transform: translate(2%, -5%) scale(1.08); }
}

/* CARD */
.card{
    width:100%;
    max-width:430px;
    padding:24px;

    background:rgba(255,255,255,0.82);
    backdrop-filter:blur(16px);

    border:1px solid rgba(255,255,255,0.8);
    border-radius:28px;

    box-shadow:
        0 20px 50px rgba(140,82,255,0.12),
        0 10px 25px rgba(255,0,161,0.08);

    text-align:center;
    position:relative;
}

/* BADGE */
.nextup-badge{
    position:absolute;
    top:-12px;
    left:50%;
    transform:translateX(-50%);
    padding:6px 12px;

    border-radius:999px;
    font-size:11px;
    font-weight:800;

    color:white;
    background:linear-gradient(135deg,#FF00A1,#8C52FF);

    box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

/* NEXT EVENT */
.next-event{
    margin-top:10px;
    font-size:14px;
    font-weight:700;
    color:#222;
}

/* LOGO */
.logo{
    width:100%;
    max-width:380px;
    border-radius:20px;
    display:block;
    margin:18px auto 24px;
}

.subtitle{
    font-size:15px;
    color:#666;
    margin-bottom:10px;
}

.location{
    color:#666;
    font-size:14px;
    margin-bottom:18px;
}

/* BUTTONS */
.btn{
    display:block;
    text-decoration:none;
    color:white;

    padding:16px 20px;
    margin-bottom:14px;

    border-radius:999px;

    font-weight:700;
    font-size:15px;

    background:linear-gradient(135deg,#FF00A1 0%,#8C52FF 100%);

    box-shadow:0 10px 22px rgba(140,82,255,.22);

    transition:all .25s ease;
}

.btn:hover{
    transform:translateY(-4px) scale(1.02);
    box-shadow:0 18px 35px rgba(140,82,255,.28);
}

/* SECTIONS */
.gigs{
    margin-top:30px;
    padding-top:24px;
    border-top:1px solid rgba(140,82,255,.12);
    text-align:left;
}

.gigs h3{
    text-align:center;
    font-size:15px;
    margin-bottom:16px;
    color:#8C52FF;
    text-transform:uppercase;
    letter-spacing:1px;
}

.gig{
    font-size:14px;
    color:#555;
    padding:8px 0;
    line-height:1.5;

    opacity:0;
    transform:translateY(18px);
    transition:all .6s ease;
}

.gig.visible{
    opacity:1;
    transform:translateY(0);
}

.date{
    display:inline-block;
    width:52px;
    font-weight:700;
    color:#8C52FF;
}

.past{
    opacity:0.6;
}

.played{
    font-size:10px;
    font-weight:800;
    margin-left:8px;
    padding:3px 8px;
    border-radius:999px;
    color:white;
    background:#999;
}
</style>
</head>

<body>

<div class="card">

    <div class="nextup-badge">NEXT UP</div>
    <div id="nextEvent" class="next-event"></div>

    <img src="https://i.ibb.co/nZfQCNB/freyindex2.png" class="logo" alt="Frey">

    <div class="subtitle">
        DJ • Creative • Social Media Management
    </div>

    <div class="location">
        Based in Amsterdam 🇳🇱
    </div>

    <a href="mailto:hello@freycreates.nl" class="btn">✉️ Bookings & Collabs</a>
    <a href="https://instagram.com/frey.m4a" class="btn" target="_blank">Instagram</a>
    <a href="https://ra.co/dj/frey-nl" class="btn" target="_blank">Resident Advisor</a>

    <div class="gigs">
        <h3>Upcoming Gigs</h3>
        <div id="upcoming"></div>
    </div>

    <div class="gigs">
        <h3>Past Gigs</h3>
        <div id="past"></div>
    </div>

</div>

<script>
const gigs = [
    { date:"27/6", venue:"Backsteeg, Rotterdam" },
    { date:"29/6", venue:"Ferry, Rotterdam" },
    { date:"10/7", venue:"Pink Noise, Amersfoort" },
    { date:"25/7", venue:"Milkshake Festival, Amsterdam" },
    { date:"31/7", venue:"Homomonument, Amsterdam" },
    { date:"1/8", venue:"Prik Pride, Amsterdam" }
];

function parseDate(d){
    const [day, month] = d.split("/");
    const year = new Date().getFullYear();
    return new Date(year, month-1, day);
}

const today = new Date();
today.setHours(0,0,0,0);

gigs.sort((a,b)=>parseDate(a.date)-parseDate(b.date));

const upcoming = gigs.filter(g => parseDate(g.date) >= today);
const past = gigs.filter(g => parseDate(g.date) < today);

/* NEXT EVENT FIXED */
const nextEventEl = document.getElementById("nextEvent");

if(upcoming.length){
    const next = upcoming[0];
    nextEventEl.innerText = `${next.date} — ${next.venue}`;
} else {
    nextEventEl.innerText = "No upcoming gigs";
}

/* UPCOMING */
const upcomingContainer = document.getElementById("upcoming");

upcoming.forEach((g) => {
    const div = document.createElement("div");
    div.className = "gig";

    div.innerHTML = `
        <span class="date">${g.date}</span>
        ${g.venue}
    `;

    upcomingContainer.appendChild(div);
});

/* PAST */
const pastContainer = document.getElementById("past");

past.forEach((g) => {
    const div = document.createElement("div");
    div.className = "gig past";

    div.innerHTML = `
        <span class="date">${g.date}</span>
        ${g.venue}
        <span class="played">PLAYED ✓</span>
    `;

    pastContainer.appendChild(div);
});

/* animation */
const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if(entry.isIntersecting){
            entry.target.classList.add("visible");
        }
    });
}, { threshold:0.15 });

document.querySelectorAll(".gig").forEach(el => {
    observer.observe(el);
});
</script>

</body>
</html>
