<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frey Creates</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

html{ scroll-behavior:smooth; }

body{
    font-family:'Open Sans',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
    background:#faf8ff;
    overflow-x:hidden;
}

/* =========================
   ANIMATED BACKGROUND FIX
========================= */
body::before{
    content:"";
    position:fixed;
    inset:-20%;
    z-index:-1;

    background:
        radial-gradient(circle at 15% 25%, rgba(140,82,255,0.85), transparent 40%),
        radial-gradient(circle at 85% 20%, rgba(255,0,161,0.75), transparent 45%),
        radial-gradient(circle at 40% 85%, rgba(120,60,255,0.55), transparent 50%),
        radial-gradient(circle at 80% 90%, rgba(255,0,161,0.45), transparent 55%);

    filter: blur(28px);
    animation: floatGlow 6s ease-in-out infinite alternate;
    will-change: transform;
}

@keyframes floatGlow{
    0%{
        transform: translate(-4%, -25%) scale(1) rotate(2deg);
    }
    50%{
        transform: translate(5%, 30%) scale(1.5) rotate(60deg);
    }
    100%{
        transform: translate(-2%, 60%) scale(1.12) rotate(-40deg);
    }
}

/* CARD */
.card{
    width:100%;
    max-width:520px;
    padding:26px;

    /* AANGEPAST: meer transparant */
    background:rgba(255,255,255,0.74);
    backdrop-filter:blur(16px);

    border:1px solid rgba(255,255,255,0.8);
    border-radius:28px;

    box-shadow:
        0 20px 50px rgba(140,82,255,0.12),
        0 10px 25px rgba(255,0,161,0.08);

    text-align:center;
    position:relative;
}

/* BADGE */
.nextup-badge{
    position:absolute;
    top:-12px;
    left:50%;
    transform:translateX(-50%);
    padding:6px 12px;

    border-radius:999px;
    font-size:11px;
    font-weight:800;

    color:white;
    background:linear-gradient(135deg,#FF00A1,#8C52FF);

    box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.next-event{
    margin-top:10px;
    font-size:15px;
    font-weight:700;
    color:#222;
}

.logo{
    width:100%;
    max-width:420px;
    border-radius:20px;
    display:block;
    margin:18px auto 24px;
}

.subtitle{
    font-size:15px;
    color:#666;
    margin-bottom:10px;
}

.location{
    color:#666;
    font-size:14px;
    margin-bottom:18px;
}

/* BUTTONS */
.btn{
    display:block;
    text-decoration:none;
    color:white;

    padding:16px 20px;
    margin-bottom:14px;

    border-radius:999px;

    font-weight:700;
    font-size:15px;

    background:linear-gradient(135deg,#FF00A1 0%,#8C52FF 100%);

    box-shadow:0 10px 22px rgba(140,82,255,.22);

    transition:all .25s ease;
}

.btn:hover{
    transform:translateY(-4px) scale(1.02);
    box-shadow:0 18px 35px rgba(140,82,255,0.28);
}

.gigs{
    margin-top:28px;
    padding-top:22px;
    border-top:1px solid rgba(140,82,255,.12);
    text-align:left;
}

.gigs h3{
    text-align:center;
    font-size:14px;
    margin-bottom:14px;
    color:#8C52FF;
    text-transform:uppercase;
    letter-spacing:1px;
    cursor:pointer;
    user-select:none;
}

.gig{
    font-size:14px;
    color:#555;
    padding:7px 0;
    line-height:1.5;
}

.date{
    display:inline-block;
    width:55px;
    font-weight:700;
    color:#8C52FF;
}

.past{ opacity:0.65; }

.played{
    font-size:10px;
    font-weight:800;
    margin-left:8px;
    padding:3px 8px;
    border-radius:999px;
    color:white;
    background:#999;
}

#past{
    max-height:0;
    overflow:hidden;
    opacity:0;
    transition:all .5s ease;
}

#past.open{
    max-height:900px;
    opacity:1;
}

@media (max-width:480px){
    .card{
        max-width:100%;
        padding:20px;
    }
}
</style>
</head>

<body>

<div class="card">

    <div class="nextup-badge">NEXT UP</div>

    <div id="nextEvent" class="next-event"></div>

    <img src="https://i.ibb.co/nZfQCNB/freyindex2.png" class="logo" alt="Frey">

    <div class="subtitle"><strong>DJ • Creative • Social Media Management</strong></div>
    <div class="location">Based in Amsterdam 🇳🇱</div>

    <a href="mailto:hello@freycreates.nl" class="btn">✉️ Bookings & Collabs</a>
    <a href="https://instagram.com/frey.m4a" class="btn" target="_blank">Instagram</a>
    <a href="https://ra.co/dj/frey-nl" class="btn" target="_blank">Resident Advisor</a>

    <div class="gigs">
        <h3>Upcoming Gigs</h3>
        <div id="upcoming"></div>
    </div>

    <div class="gigs">
        <h3 onclick="togglePast()">Past Gigs ▾</h3>
        <div id="past"></div>
    </div>

</div>

<script>
const gigs = [
    { date:"27/6", venue:"Backsteeg, Rotterdam" },
    { date:"29/6", venue:"Ferry, Rotterdam" },
    { date:"10/7", venue:"Pink Noise, Amersfoort" },
    { date:"25/7", venue:"Milkshake Festival, Amsterdam" },
    { date:"31/7", venue:"Homomonument, Amsterdam" },
    { date:"1/8", venue:"Prik Pride, Amsterdam" },

    { date:"19/6", venue:"Ferry, Rotterdam" },
    { date:"29/5", venue:"Ferry, Rotterdam" },
    { date:"8/5", venue:"NYX, Amsterdam" },
    { date:"3/4", venue:"Rabbit's Hole, Singapore" },
    { date:"28/3", venue:"NYX, Amsterdam" }
];

function parseDate(d){
    const [day, month] = d.split("/");
    const year = new Date().getFullYear();
    return new Date(year, month-1, day);
}

const today = new Date();
today.setHours(0,0,0,0);

gigs.sort((a,b)=>parseDate(a.date)-parseDate(b.date));

const upcoming = gigs.filter(g => parseDate(g.date) >= today);
const past = gigs.filter(g => parseDate(g.date) < today);

const nextEventEl = document.getElementById("nextEvent");

if(upcoming.length){
    const next = upcoming[0];
    nextEventEl.innerText = `${next.date} — ${next.venue}`;
} else {
    nextEventEl.innerText = "No upcoming gigs";
}

const upcomingContainer = document.getElementById("upcoming");

upcoming.forEach((g) => {
    const div = document.createElement("div");
    div.className = "gig";
    div.innerHTML = `<span class="date">${g.date}</span>${g.venue}`;
    upcomingContainer.appendChild(div);
});

const pastContainer = document.getElementById("past");

past
    .sort((a,b)=>parseDate(b.date)-parseDate(a.date))
    .forEach((g) => {
        const div = document.createElement("div");
        div.className = "gig past";
        div.innerHTML = `
            <span class="date">${g.date}</span>
            ${g.venue}
            <span class="played">PLAYED ✓</span>
        `;
        pastContainer.appendChild(div);
    });

function togglePast(){
    document.getElementById("past").classList.toggle("open");
}
</script>

</body>
</html>
