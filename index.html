<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frey Creates - Contact</title>
    
    <!-- Google Fonts Open Sans -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Open Sans', Arial, sans-serif; 
            text-align: center; 
            background: linear-gradient(135deg, #f5f0fa 0%, #fff6fb 100%);
            background-attachment: fixed;
            padding: 60px 20px; 
            margin: 0;
        }
        .card { 
            background: white; 
            padding: 40px 30px; 
            max-width: 380px; 
            margin: auto; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(139, 63, 214, 0.05); 
        }
        .logo {
            max-width: 75%;
            height: auto;
            margin-bottom: 20px;
            display: inline-block;
        }
        h1 { display: none; } 
        p { 
            color: #555; 
            line-height: 1.6; 
            margin-bottom: 30px; 
            font-size: 15px; 
            letter-spacing: 0.3px;
        }
        .btn { 
            display: block; 
            background: #8b3fd6; 
            color: white; 
            padding: 14px; 
            margin: 14px 0; 
            text-decoration: none; 
            border-radius: 30px; 
            font-weight: 700; 
            font-size: 15px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(139, 63, 214, 0.15);
        }
        .btn:hover { 
            background: #e03299; 
            transform: translateY(-2px); 
            box-shadow: 0 6px 15px rgba(224, 50, 153, 0.25);
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- De werkende link naar jouw logo -->
        <img src="https://i.ibb.co/b52C3SY1/freylogo1.png" alt="Frey Logo" class="logo">
        
        <p>DJ, Social Media Management, Content.</p>
        
        <a href="https://instagram.com/frey.m4a" class="btn" target="_blank">Instagram</a>
        <a href="mailto:hello@freycreates.nl" class="btn">Send an email</a>
    </div>
</body>
</html>
